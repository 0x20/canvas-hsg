<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HSG Canvas</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            min-height: 100vh;
            padding: 24px;
        }
        .header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 20px;
        }
        .header a {
            color: #4fc3f7;
            text-decoration: none;
            font-size: 0.9rem;
        }
        .header a:hover { color: #fff; }
        h1 { font-size: 1.3rem; font-weight: 600; }
        .toolbar {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }
        button {
            background: #6c63ff;
            color: #fff;
            border: 1px solid #6c63ff;
            padding: 6px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            font-family: inherit;
        }
        button:hover { filter: brightness(1.15); }
        .timestamp {
            color: #9e9e9e;
            font-size: 0.8rem;
            align-self: center;
        }
        pre {
            background: #242440;
            border: 1px solid #35355a;
            border-radius: 8px;
            padding: 20px;
            overflow-x: auto;
            font-size: 0.9rem;
            line-height: 1.6;
            tab-size: 2;
        }
        .string { color: #a5d6a7; }
        .number { color: #ffcc80; }
        .boolean { color: #ef9a9a; }
        .null { color: #9e9e9e; }
        .key { color: #90caf9; }
        .error {
            background: rgba(239, 83, 80, 0.15);
            border-color: #c62828;
            color: #ef5350;
            padding: 16px;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div class="header">
        <a href="/">&larr; Control Panel</a>
        <h1 id="title">Loading...</h1>
    </div>
    <div class="toolbar">
        <button onclick="refresh()">Refresh</button>
        <button onclick="copyJson()">Copy JSON</button>
        <span class="timestamp" id="timestamp"></span>
    </div>
    <pre id="output">Loading...</pre>

    <script>
        const params = new URLSearchParams(location.search);
        const endpoint = params.get('endpoint') || '/status';
        const label = params.get('title') || endpoint;
        let rawJson = '';

        document.getElementById('title').textContent = label;
        document.title = 'HSG Canvas - ' + label;

        function syntaxHighlight(json) {
            json = json.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            return json.replace(
                /("(\\u[\da-fA-F]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g,
                function (match) {
                    let cls = 'number';
                    if (/^"/.test(match)) {
                        cls = /:$/.test(match) ? 'key' : 'string';
                    } else if (/true|false/.test(match)) {
                        cls = 'boolean';
                    } else if (/null/.test(match)) {
                        cls = 'null';
                    }
                    return '<span class="' + cls + '">' + match + '</span>';
                }
            );
        }

        async function refresh() {
            const output = document.getElementById('output');
            const ts = document.getElementById('timestamp');
            try {
                const res = await fetch(endpoint);
                if (!res.ok) throw new Error(res.status + ' ' + res.statusText);
                const data = await res.json();
                rawJson = JSON.stringify(data, null, 2);
                output.innerHTML = syntaxHighlight(rawJson);
                ts.textContent = 'Updated ' + new Date().toLocaleTimeString();
            } catch (e) {
                output.className = 'error';
                output.textContent = 'Failed to fetch ' + endpoint + ': ' + e.message;
            }
        }

        function copyJson() {
            if (rawJson) {
                navigator.clipboard.writeText(rawJson);
            }
        }

        refresh();
    </script>
</body>
</html>
