# HSG Canvas - Angie reverse proxy configuration
# Symlinked from: /home/hsg/srs_server/config/angie/hsg-canvas.conf

upstream fastapi {
    server 127.0.0.1:8000;
}

server {
    listen 80;
    server_name _;

    # /canvas/ is now served by FastAPI as a built React bundle (StaticFiles
    # mount on frontend/dist). Production no longer runs the Vite dev server.
    # Everything routes to FastAPI: /canvas/, API, WebSocket, control panel, static.
    location / {
        proxy_pass http://fastapi;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
