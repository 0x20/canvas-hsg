# HSG Canvas - Angie reverse proxy configuration
# Symlinked from: /home/hsg/srs_server/config/angie/hsg-canvas.conf

upstream fastapi {
    server 127.0.0.1:8000;
}

server {
    listen 80;
    server_name _;

    # While FastAPI is starting/restarting it isn't listening yet, so proxying
    # would yield a raw "502 Bad Gateway". Serve a branded loading splash on
    # upstream errors instead; it auto-refreshes and becomes the canvas once
    # FastAPI is up. Only Angie is guaranteed up in this window, so the page is
    # a static file Angie serves itself.
    error_page 502 503 504 = /__hsg_loading;
    location = /__hsg_loading {
        internal;
        alias /etc/angie/hsg-loading.html;
        default_type text/html;
        add_header Cache-Control "no-store";
    }

    # /canvas/ is now served by FastAPI as a built React bundle (StaticFiles
    # mount on frontend/dist). Production no longer runs the Vite dev server.
    # Everything routes to FastAPI: /canvas/, API, WebSocket, control panel, static.
    location / {
        proxy_pass http://fastapi;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # Treat connection failures to a down upstream as errors we can catch
        # with error_page (→ loading splash) rather than passing 502 through.
        proxy_intercept_errors on;
    }
}
