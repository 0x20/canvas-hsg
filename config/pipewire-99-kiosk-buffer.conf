# HSG Canvas - Larger audio buffer to survive CPU/thermal spikes.
# Pi 4 throttles at ~80C; the default 1024 quantum starves and causes
# audio dropouts. 2048-sample floor (~42ms) trades latency (irrelevant on
# a kiosk) for resilience. Reverse: delete this file + restart pipewire.
context.properties = {
    default.clock.rate        = 48000
    default.clock.quantum     = 2048
    default.clock.min-quantum = 2048
    default.clock.max-quantum = 4096
}
